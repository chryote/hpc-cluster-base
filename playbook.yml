---
# 1. Base Configuration
- name: Install foundational config to all nodes
  hosts: all
  become: yes
  tasks:
    - name: Update apt cache and install system baselines
      apt:
        name: ['chrony', 'curl', 'ca-certificates', 'gnupg', 'lvm2']
        state: present
        update_cache: yes
    
    - name: Ensure chrony time service is active for Slurm
      systemd:
        name: chrony
        state: started
        enabled: yes
    
    - name: Map local cluster resolution in /etc/hosts
      blockinfile:
        path: /etc/hosts
        block: |
          192.168.56.10 master
          192.168.56.11 worker1
          192.168.56.12 worker2
          192.168.56.20 storage

# 2. Slurm & Munge setup (master and workers)
- name: Configure Slurm engine cluster pipeline
  hosts: slurm_cluster
  become: yes
  tasks:
    - name: Install Munge security validation layer and core Slurm binaries
      apt:
        name: ['munge', 'slurmctld', 'slurmd', 'ceph-common']
        state: present

    - name: Deploy identical shared verification key for Munge auth
      copy:
        content: "VagrantSlurmSandboxSecretKeyMunge1234567890"
        dest: /etc/munge/munge.key
        owner: munge
        group: munge
        mode: '0400'

    - name: Restart Munge daemon to load verification key
      systemd:
        name: munge
        state: restarted
        enabled: yes

    - name: Provision standard Slurm control config layout
      copy:
        dest: /etc/slurm/slurm.conf
        content: |
          ClusterName=vbox_cluster
          SlurmctldHost=master(192.168.56.10)
          AuthType=auth/munge
          CryptoType=crypto/munge
          SlurmUser=slurm
          SlurmdUser=root
          SlurmctldPidFile=/var/run/slurmctld.pid
          SlurmdPidFile=/var/run/slurmd.pid
          StateSaveLocation=/var/spool/slurm/ctld
          NodeName=worker1 NodeAddr=192.168.56.11 CPUs=2 RealMemory=900 State=UNKNOWN
          NodeName=worker2 NodeAddr=192.168.56.12 CPUs=2 RealMemory=900 State=UNKNOWN
          PartitionName=debug Nodes=worker1,worker2 Default=YES MaxTime=INFINITE State=UP
        owner: slurm
        group: slurm
        mode: '0644'
    
    - name: Ensure correct spool state subdirectory directory structural limits
      file:
        path: /var/spool/slurm/slurmctld
        state: directory
        owner: slurm
        group: slurm

- name: Bind Shared Parallel Storage Array Infrastructure
  hosts: all
  become: yes
  tasks:
    - name: Pull administrative security keyring from the storage host
      fetch:
        src: /etc/ceph/ceph.client.admin.keyring
        dest: /tmp/ceph.client.admin.keyring
        flat: yes
      when: inventory_hostname in groups['storage_nodes']

    - name: Create native ceph destination configuration directories
      file:
        path: /etc/ceph
        state: directory
        mode: '0755'
      when: inventory_hostname in groups['slurm_cluster']

    - name: Extract naked base64 token and save it cleanly as a pure secret
      copy:
        # This regex magic finds the "key = XYZ" line and grabs ONLY the token string
        content: "{{ lookup('file', '/tmp/ceph.client.admin.keyring') | regex_search('key\\s*=\\s*(\\S+)', '\\1') | first }}\n"
        dest: /etc/ceph/ceph.client.admin.secret
        owner: root
        group: root
        mode: '0600'
      when: inventory_hostname in groups['slurm_cluster']

    - name: Create local shared target mount-point tracking directory
      file:
        path: /mnt/slurm_shared
        state: directory
        mode: '0777'
      when: inventory_hostname in groups['slurm_cluster']

    - name: Mount distributed CephFS partition volume via Kernel driver
      mount:
        path: /mnt/slurm_shared
        src: "192.168.56.20:/"
        fstype: ceph
        opts: "name=admin,secretfile=/etc/ceph/ceph.client.admin.secret,noatime,_netdev"
        state: mounted
      when: inventory_hostname in groups['slurm_cluster']

- name: Boot master control scheduler service
  hosts: master
  become: yes
  tasks:
    - name: Start Slurm controller management daemon
      systemd:
        name: slurmctld
        state: restarted
        enabled: yes

- name: Boot compute cluster nodes
  hosts: workers
  become: yes
  tasks:
    - name: Start slurm worker engine agent daemon
      systemd:
        name: slurmd
        state: restarted
        enabled: yes

# 3. Docker and Containerized ceph setup
- name: Deploy Storage Node and Container Runtime
  hosts: storage_nodes
  become: yes
  tasks:
  - name: Install cephadm depedencies and container runtimes
    apt:
      name: ['cephadm', 'podman-docker']
      state: present
  
  - name: Bootstrap single-node Ceph storage container engine
    command: >
      cephadm bootstrap
      --mon-ip 192.168.56.20
      --skip-dashboard
      --single-host-defaults
    args:
      creates: /etc/ceph/ceph.conf
  
  - name: Pause briefly to allow ceph orchestrator loops
    pause:
      seconds: 15

  - name: Instruct Ceph cluster engnie to claim the secondary raw disk asset
    command: cephadm shell -- ceph orch apply osd --all-available-devices